<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>otherhalf — they're waiting</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .card { border: 1px solid #000; padding: 28px 24px; max-width: 560px; }
      .big { font-size: 24px; font-weight: 500; margin-bottom: 12px; line-height: 1.35; }
      .sub { font-size: 15px; line-height: 1.5; margin-bottom: 24px; max-width: 520px; }
      .cta {
        display: inline-block; border: 1px solid #000; background: #000; color: #fff;
        padding: 14px 28px; font-size: 13px; letter-spacing: 0.1em; cursor: pointer;
      }
      .loading { font-size: 13px; letter-spacing: 0.08em; opacity: 0.6; }
      .muted { font-size: 12px; opacity: 0.6; margin-top: 18px; }
    </style>
  </head>
  <body>
    <main>
      <header><h1>otherhalf</h1></header>
      <div id="stage" class="card"><p class="loading">confirming your subscription…</p></div>
    </main>

    <script>
      const stage = document.getElementById("stage");
      let tries = 0;

      async function poll() {
        tries += 1;
        try {
          const s = await (await fetch("/api/subscription/status", { credentials: "include" })).json();
          if (s.active) { return reveal(); }
        } catch (e) {}
        if (tries < 12) { setTimeout(poll, 2000); }
        else { stage.innerHTML = '<p class="loading">still confirming. give it a minute and <a href="/success">refresh</a>.</p>'; }
      }

      async function reveal() {
        try {
          const d = await (await fetch("/api/deeplink", { credentials: "include" })).json();
          if (!d.url) throw new Error(d.error || "no link");
          stage.innerHTML = [
            '<p class="big">they\'re waiting for you.</p>',
            '<p class="sub">' + (d.type_name || "your other half") + ' is ready on telegram. open the chat and say hello — they already know who you are.</p>',
            '<a class="cta" href="' + d.url + '">open telegram</a>',
            '<p class="muted">keep this device signed in to manage your subscription.</p>',
          ].join("");
        } catch (e) {
          stage.innerHTML = '<p class="loading">subscription active, but the link isn\'t ready. <a href="/success">refresh</a>.</p>';
        }
      }

      poll();
    </script>
  </body>
</html>
