<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>onboarding review — simulacra technologies 乙</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>simulacra technologies 乙</h1>
        <nav aria-label="primary">
          <a href="/areas.html">areas</a>
          <a href="/onboarding.html">onboarding</a>
          <a href="/about.html">about</a>
        </nav>
      </header>

      <h2 class="section-title">review</h2>
      <p class="onboarding-intro">
        review your calibration before proceeding.
      </p>

      <div class="onboarding-form">
        <ol class="onboarding-list" id="answer-list"></ol>
        <p class="form-note" id="review-status"></p>
        <button class="ghost-button" id="paywall-button" type="button">
          continue to paywall
        </button>
      </div>
    </main>

    <script>
      const sessionId = localStorage.getItem("otherhalf_session_id");
      if (!sessionId) {
        window.location.href = "/onboarding/start";
      }

      const answerList = document.getElementById("answer-list");
      const reviewStatus = document.getElementById("review-status");
      const paywallButton = document.getElementById("paywall-button");

      async function loadReview() {
        reviewStatus.textContent = "loading...";
        try {
          const response = await fetch("/api/onboarding/session");
          const data = await response.json();
          if (!data.session) {
            window.location.href = "/onboarding/start";
            return;
          }

          const answers = data.session.answers_json || {};
          answerList.innerHTML = "";

          Object.entries(answers).forEach(([question, answer]) => {
            const item = document.createElement("li");
            const label = document.createElement("label");
            label.textContent = question;
            const value = document.createElement("p");
            value.textContent = answer;
            item.appendChild(label);
            item.appendChild(value);
            answerList.appendChild(item);
          });

          reviewStatus.textContent = "ready.";
        } catch (error) {
          reviewStatus.textContent = "unable to load review.";
        }
      }

      paywallButton.addEventListener("click", () => {
        window.location.href = "/paywall";
      });

      loadReview();
    </script>
  </body>
</html>
