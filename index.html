<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F2F4F7" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Simulacra v1.2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Helvetica Neue", "Helvetica", "Arial", "sans-serif"],
            },
            colors: {
              sterile: "#F2F4F7",
              surface: "#F8FAFD",
              panel: "#EEF2F6",
              matte: "#333333",
              medBlue: "#6B9ED9",
              termGreen: "#48A883",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background: #f2f4f7;
        color: #333;
      }

      .ring-animate {
        animation: pulseRing 3.2s ease-in-out infinite;
      }

      @keyframes pulseRing {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.92;
        }
        50% {
          transform: scale(1.03);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="font-sans antialiased tracking-tight">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useState, useEffect } = React;

      function App() {
        const [confirmed, setConfirmed] = useState(false);
        const [installPrompt, setInstallPrompt] = useState(null);

        useEffect(() => {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/service-worker.js").catch(() => {});
          }

          const handler = (event) => {
            event.preventDefault();
            setInstallPrompt(event);
          };

          window.addEventListener("beforeinstallprompt", handler);
          return () => window.removeEventListener("beforeinstallprompt", handler);
        }, []);

        const beginOnboarding = () => {
          if (!confirmed) return;
          window.location.href = "/onboarding/start/";
        };

        const installApp = async () => {
          if (!installPrompt) return;
          installPrompt.prompt();
          await installPrompt.userChoice;
          setInstallPrompt(null);
        };

        return (
          <main className="mx-auto flex min-h-screen w-full max-w-md flex-col justify-between px-5 pb-8 pt-8 md:max-w-3xl md:px-8 md:pt-12">
            <section className="space-y-6">
              <div className="flex items-center justify-between">
                <div className="ring-animate h-24 w-24 rounded-full bg-[conic-gradient(from_160deg_at_50%_50%,#bed4f3_10%,#6b9ed9_60%,#e9eff8_92%)] p-[7px] shadow-[0_20px_50px_rgba(82,102,131,0.16)]">
                  <div className="flex h-full w-full items-center justify-center rounded-full bg-surface text-medBlue shadow-[inset_0_2px_7px_rgba(255,255,255,0.9),inset_0_-10px_26px_rgba(107,158,217,0.24)]">
                    <span className="text-xl font-semibold">Type</span>
                  </div>
                </div>
                <div className="ring-animate h-20 w-20 rounded-full bg-[conic-gradient(from_40deg_at_50%_50%,#c6ebdf_12%,#48a883_64%,#eef8f5_95%)] p-[6px] shadow-[0_18px_42px_rgba(73,123,104,0.16)]">
                  <div className="flex h-full w-full items-center justify-center rounded-full bg-surface text-termGreen shadow-[inset_0_2px_6px_rgba(255,255,255,0.95),inset_0_-10px_24px_rgba(72,168,131,0.2)]">
                    <span className="text-base font-semibold">Spec</span>
                  </div>
                </div>
              </div>

              <article className="rounded-[2rem] bg-surface p-6 shadow-[0_30px_80px_rgba(96,112,132,0.18),inset_0_2px_0_rgba(255,255,255,0.9),inset_0_-8px_18px_rgba(136,151,171,0.16)] md:p-8">
                <p className="text-xs uppercase tracking-[0.18em] text-[#667084]">Home Console</p>
                <h1 className="mt-3 text-2xl font-semibold leading-tight text-matte md:text-3xl">
                  Simulacra hyperpersonalized artificial companion, v1.2
                </h1>
                <p className="mt-5 text-sm leading-relaxed text-[#4a5568] md:text-base">
                  Confirm you are 18 or older to begin
                </p>

                <label className="mt-5 flex items-center gap-3 rounded-3xl bg-panel px-4 py-3 shadow-[inset_0_2px_4px_rgba(255,255,255,0.75),inset_0_-8px_14px_rgba(130,147,170,0.15)]">
                  <input
                    type="checkbox"
                    checked={confirmed}
                    onChange={(event) => setConfirmed(event.target.checked)}
                    className="h-5 w-5 appearance-none rounded-md bg-[#dfe5ec] shadow-[inset_0_2px_4px_rgba(98,113,130,0.2),0_2px_4px_rgba(255,255,255,0.9)] checked:bg-medBlue checked:shadow-[inset_0_0_0_2px_rgba(255,255,255,0.8),0_0_0_8px_rgba(107,158,217,0.16)] transition-all duration-500"
                  />
                  <span className="text-sm text-[#3f4856]">I confirm I am at least 18 years old.</span>
                </label>

                <div className="mt-6 flex items-center gap-3">
                  <button
                    type="button"
                    onClick={beginOnboarding}
                    disabled={!confirmed}
                    className="relative inline-flex w-full items-center justify-center rounded-3xl bg-[linear-gradient(145deg,#f8fbff_0%,#dde5ee_100%)] px-5 py-3 text-sm font-semibold text-matte shadow-[0_14px_28px_rgba(95,111,132,0.22),inset_0_2px_3px_rgba(255,255,255,0.95),inset_0_-6px_10px_rgba(100,117,140,0.2)] transition-all duration-500 enabled:hover:-translate-y-0.5 enabled:hover:shadow-[0_18px_32px_rgba(95,111,132,0.24),inset_0_2px_4px_rgba(255,255,255,0.95),inset_0_-8px_12px_rgba(100,117,140,0.24)] enabled:active:translate-y-0.5 enabled:active:shadow-[inset_0_4px_8px_rgba(104,121,143,0.35),0_6px_16px_rgba(95,111,132,0.2)] disabled:cursor-not-allowed disabled:opacity-45"
                  >
                    Begin
                    <span className="pointer-events-none absolute inset-0 rounded-3xl shadow-[0_0_0_1px_rgba(182,194,209,0.8),0_0_0_6px_rgba(255,255,255,0.38)]"></span>
                  </button>
                  {installPrompt && (
                    <button
                      type="button"
                      onClick={installApp}
                      className="rounded-3xl bg-panel px-4 py-3 text-xs font-medium text-[#516074] shadow-[0_10px_20px_rgba(93,108,129,0.14),inset_0_1px_2px_rgba(255,255,255,0.8)] transition duration-500 hover:shadow-[0_12px_24px_rgba(93,108,129,0.2),inset_0_2px_3px_rgba(255,255,255,0.8)]"
                    >
                      Install
                    </button>
                  )}
                </div>
              </article>
            </section>

            <nav
              aria-label="Bottom navigation"
              className="mx-auto mt-7 flex w-full max-w-sm items-center justify-between rounded-[2rem] bg-surface px-4 py-3 shadow-[0_22px_60px_rgba(95,112,132,0.2),inset_0_2px_0_rgba(255,255,255,0.9),inset_0_-9px_18px_rgba(128,145,168,0.2)]"
            >
              <a
                href="/"
                className="flex min-w-[90px] flex-col items-center gap-1 rounded-3xl px-3 py-2 text-matte shadow-[inset_0_2px_4px_rgba(255,255,255,0.86),inset_0_-10px_14px_rgba(126,143,166,0.22)] transition duration-500"
              >
                <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="1.8">
                  <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1v-9.5z" />
                </svg>
                <span className="text-xs font-semibold">Home</span>
              </a>

              <a
                href="/onboarding/start/"
                className="flex min-w-[90px] flex-col items-center gap-1 rounded-3xl px-3 py-2 text-[#6a778c] transition duration-500 hover:text-matte"
              >
                <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="1.8">
                  <path d="M4 8h16M4 12h10M4 16h12" />
                </svg>
                <span className="text-xs">Onboarding</span>
              </a>

              <a
                href="/about.html"
                className="flex min-w-[90px] flex-col items-center gap-1 rounded-3xl px-3 py-2 text-[#6a778c] transition duration-500 hover:text-matte"
              >
                <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="1.8">
                  <path d="M4 12a8 8 0 1 1 16 0v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-5z" />
                  <path d="M8 11h8M8 15h6" />
                </svg>
                <span className="text-xs">Feedback</span>
              </a>
            </nav>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
