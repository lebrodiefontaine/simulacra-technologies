<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>otherhalf</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .hero { max-width: 560px; }
      .lede { font-size: 16px; margin: 18px 0; max-width: 520px; }
      .age-gate {
        display: flex; align-items: flex-start; gap: 10px;
        border: 1px solid #000; padding: 14px 16px; margin: 28px 0 20px;
        max-width: 520px;
      }
      .age-gate input { margin-top: 3px; }
      .cta {
        display: inline-block; border: 1px solid #000; background: #000; color: #fff;
        padding: 14px 28px; font-size: 13px; letter-spacing: 0.1em;
        cursor: pointer; transition: opacity .2s;
      }
      .cta:disabled { opacity: 0.35; cursor: not-allowed; }
      .fine { font-size: 11px; letter-spacing: 0.06em; opacity: 0.6; margin-top: 36px; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>otherhalf</h1>
      </header>
      <section class="hero">
        <p class="lede">
          a companion composed from the shape of how you love. answer twelve
          questions. we build the other half that fits — then you talk, on
          telegram, for as long as you like. they remember.
        </p>

        <label class="age-gate">
          <input type="checkbox" id="age" />
          <span>i confirm i am at least 18 years old.</span>
        </label>

        <button class="cta" id="begin" disabled>begin</button>

        <p class="fine">a simulacra technologies project · private by design</p>
      </section>
    </main>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js").catch(() => {});
      }
      const age = document.getElementById("age");
      const begin = document.getElementById("begin");
      age.addEventListener("change", () => { begin.disabled = !age.checked; });
      begin.addEventListener("click", () => {
        if (age.checked) window.location.href = "/onboarding.html";
      });
    </script>
  </body>
</html>
