<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>otherhalf — the romantic type index</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .progress { font-size: 11px; letter-spacing: 0.12em; opacity: 0.55; margin-bottom: 18px; }
      .q-card { border: 1px solid #000; padding: 28px 24px; max-width: 560px; }
      .q-prompt { font-size: 20px; font-weight: 500; margin-bottom: 22px; line-height: 1.35; }
      .opt {
        display: block; width: 100%; text-align: left; border: 1px solid #000;
        background: #fff; padding: 16px 18px; margin-bottom: 12px; font-size: 15px;
        cursor: pointer; line-height: 1.4; transition: background .15s, color .15s;
      }
      .opt:hover { background: #000; color: #fff; }
      .intro { max-width: 520px; font-size: 15px; margin-bottom: 24px; }
      .loading { font-size: 13px; letter-spacing: 0.08em; opacity: 0.6; }
    </style>
  </head>
  <body>
    <main>
      <header><h1>the romantic type index</h1></header>
      <p class="intro" id="intro">
        twelve questions. there are no wrong answers — only the shape of how you
        love. your answers compose your other half.
      </p>
      <div id="stage" class="q-card"><p class="loading">preparing…</p></div>
    </main>

    <script>
      let config = null;
      let sessionId = null;
      let order = [];
      let idx = 0;

      const stage = document.getElementById("stage");

      async function init() {
        try {
          config = await (await fetch("/config/onboarding.json", { cache: "no-store" })).json();
          const start = await fetch("/api/onboarding/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: "{}",
          });
          const data = await start.json();
          sessionId = data.session_id;
          // linear order following `next`
          let cur = config.questions[0];
          while (cur) {
            order.push(cur);
            cur = cur.next ? config.questions.find((q) => q.id === cur.next) : null;
          }
          render();
        } catch (e) {
          stage.innerHTML = '<p class="loading">something went wrong. refresh to try again.</p>';
        }
      }

      function render() {
        const q = order[idx];
        const n = order.length;
        const html = [
          '<p class="progress">' + (idx + 1) + " / " + n + "</p>",
          '<p class="q-prompt">' + q.prompt + "</p>",
        ];
        q.options.forEach((o) => {
          html.push(
            '<button class="opt" data-v="' + o.value + '">' + o.label + "</button>"
          );
        });
        stage.innerHTML = html.join("");
        document.getElementById("intro").style.display = "none";
        stage.querySelectorAll(".opt").forEach((btn) => {
          btn.addEventListener("click", () => answer(q.id, btn.getAttribute("data-v")));
        });
      }

      async function answer(questionId, value) {
        stage.innerHTML = '<p class="loading">…</p>';
        try {
          await fetch("/api/onboarding/answer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ session_id: sessionId, question_id: questionId, answer: value }),
          });
        } catch (e) {}
        idx += 1;
        if (idx < order.length) {
          render();
        } else {
          await complete();
        }
      }

      async function complete() {
        stage.innerHTML = '<p class="loading">composing your other half…</p>';
        try {
          await fetch("/api/onboarding/complete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ session_id: sessionId }),
          });
        } catch (e) {}
        window.location.href = "/paywall";
      }

      init();
    </script>
  </body>
</html>
